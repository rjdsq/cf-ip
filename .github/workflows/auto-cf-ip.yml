name: 优选采集
run-name: ${{ github.event_name == 'repository_dispatch' && '优选采集-自动执行' || '优选采集' }}

on:
  workflow_dispatch:
  repository_dispatch:
    types: [优选采集-自动执行]
  schedule:
    - cron: '5,25,45 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出
        uses: actions/checkout@v4

      - name: 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 依赖
        run: pip install requests beautifulsoup4

      - name: 执行
        run: |
          # 运行各路抓取脚本
          python cf.090227.xyz.py || true
          python vps789.com.py || true
          python cf-speed-dns.py || true
          # 运行汇总对账脚本 (会自动处理 极速.txt)
          python max.py

      - name: 推送
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 强制北京时间提交
          git commit -m "更新时间 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" || exit 0
          git push
